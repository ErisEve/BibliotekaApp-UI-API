server:
    port: 8082

spring:
    application:
        name: user-service
    datasource:
        url: jdbc:postgresql://localhost:5432/library_metadata
        username: postgres
        password: 1
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true
        hostname: localhost
        instance-id: ${spring.application.name}

logging:
    level:
        com.netflix.eureka: DEBUG
        com.netflix.discovery: DEBUG

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,gateway  # Add gateway if it's a gateway service
            base-path: /actuator  # Default path
    endpoint:
        health:
            show-details: always
            show-components: always
        info:
            enabled: true
        metrics:
            enabled: true
    info:
        env:
            enabled: true
        build:
            enabled: true

info:
    app:
        name: ${spring.application.name}
        version: 1.0.0
        description: ${spring.application.name} Service
        java:
            version: ${java.version}