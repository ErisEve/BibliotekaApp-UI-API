server:
    port: 8084

spring:
    application:
        name: seat-management-service
    datasource:
        url: jdbc:postgresql://localhost:5432/library_metadata
        username: postgres
        password: 1
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
            show-sql: true
            dialect: org.hibernate.dialect.PostgreSQLDialect
    jwt:
        secret: "this_is_a_secret_key_for_jwt_library_api_12345"
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true
        hostname: localhost
        instance-id: ${spring.application.name}

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,gateway  # Add gateway if it's a gateway service
            base-path: /actuator  # Default path
    endpoint:
        health:
            show-details: always
            show-components: always
        info:
            enabled: true
        metrics:
            enabled: true
    info:
        env:
            enabled: true
        build:
            enabled: true

info:
    app:
        name: ${spring.application.name}
        version: 1.0.0
        description: ${spring.application.name} Service
        java:
            version: ${java.version}