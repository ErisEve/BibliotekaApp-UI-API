<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-header">
            <div class="brand-icon"><i class="fas fa-book-open"></i></div>
            <h1>Biblioteka<span>Online Servis</span></h1>
            <p>Uloguj se u biblioteku</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Pogresan email ili sifra</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input
                        type="email"
                        id="email"
                        placeholder="librarian@library.org"
                        value="test@example.com"
                        required
                />
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Sifra
                </label>
                <div class="password-wrapper">
                    <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            value="password123"
                            required
                    />
                    <button type="button" id="togglePassword" class="toggle-btn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Uloguj se
            </button>
        </form>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i> Logovanje...
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
