<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervacija stola u biblioteci</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/seat_reservation.css}" />
</head>
<body>
<div class="library-dashboard">
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-left">
            <div class="brand-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <h1>Biblioteka<span>Rezervacija stola</span></h1>
        </div>
        <a href="#" class="nav-link active" onclick="window.location.href = '/dashboard';">
            <i class="fas fa-hand-holding-heart"></i>
            Pozajmi knjigu
        </a>
        <div class="header-actions">
            <!--user profile clickable-->
            <div class="user-profile" id="userProfile" role="button" tabindex="0" aria-haspopup="true">
                <div class="avatar">L</div>
                <span id="userNameDisplay"></span>
                <i class="fas fa-chevron-down chevron" id="chevronIcon"></i>

                <!-- context menu -->
                <div class="context-menu" id="contextMenu" role="menu">
                    <button class="menu-item" id="editUserBtn">
                        <i class="fas fa-user-edit"></i> Promeni podatke
                    </button>
                    <div class="menu-divider"></div>
                    <button class="menu-item danger" id="logoutBtn" role="menuitem">
                        <i class="fas fa-sign-out-alt"></i> Odjavi se
                    </button>
                </div>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-info">
                <h4>Slobodno</h4>
                <div class="value" id="availableCount">0</div>
            </div>
            <div class="stat-icon available">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-info">
                <h4>Zauzeto</h4>
                <div class="value" id="occupiedCount">0</div>
            </div>
            <div class="stat-icon occupied">
                <i class="fas fa-times-circle"></i>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-info">
                <h4>Selektovano</h4>
                <div class="value" id="selectedCount">0</div>
            </div>
            <div class="stat-icon selected">
                <i class="fas fa-check-double"></i>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div>
            <div class="section-header">
                <h2>Prostor za citanje</h2>
                <span class="badge-count" id="totalSeatsBadge"><i class="fas fa-chair" style="color: #1e2a4a;"></i>0 </span>
            </div>
            <div class="seat-grid" id="seatGrid">
                <!-- Seats will be rendered here -->
            </div>

            <!-- Action Panel -->
            <div class="action-panel">
                <div class="selected-info">
                    <span style="font-weight: 500; color: #1e2a4a;">Selected:</span>
                    <span id="selectedSeatDisplay" style="color: #63738e;">None</span>
                    <div id="selectedSeatPreview" style="display: none;" class="seat-preview">
                        <i class="fas fa-chair"></i>
                        <span id="selectedSeatNumber">-</span>
                        <button class="remove-btn" onclick="clearSelection()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-success" id="reserveBtn" onclick="reserveSeat()" disabled>
                        <i class="fas fa-check"></i> Rezervisi
                    </button>
                    <button class="btn btn-outline" onclick="refreshSeats()">
                        <i class="fas fa-sync-alt"></i> Osvezi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-meta">
            <span>
                <i class="fas fa-circle" style="color: #48bb78; font-size: 0.5rem; vertical-align: middle;"></i>
                Slobodno
                <i class="fas fa-circle" style="color: #fc8181; font-size: 0.5rem; vertical-align: middle; margin-left: 12px;"></i>
                Zauzeto
                <i class="fas fa-circle" style="color: #4299e1; font-size: 0.5rem; vertical-align: middle; margin-left: 12px;"></i>
                Selektovano
            </span>
    </div>
</div>
<!-- ========== MODAL (edit user info) ========== -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true">
    <div class="modal-card">
        <div class="modal-header">
            <h2><i class="fas fa-user-cog"></i> Izmeni profil</h2>
            <button class="modal-close" id="closeModalBtn" aria-label="Close modal"><i class="fas fa-times"></i></button>
        </div>

        <form id="editForm" novalidate>
            <div class="form-group">
                <label for="emailInput"><i class="fas fa-envelope" style="margin-right: 6px; color: #4f6a8a;"></i> Email address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="librarian@library.org" />
                </div>
                <div class="form-hint">Unesi novu email adresu.</div>
            </div>

            <div class="form-group">
                <label for="passwordInput"><i class="fas fa-lock" style="margin-right: 6px; color: #4f6a8a;"></i> Nova sifra</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••" />
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPasswordInput"><i class="fas fa-check-circle" style="margin-right: 6px; color: #4f6a8a;"></i> Potvrdi sifru</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPasswordInput" placeholder="••••••••" />
                </div>
            </div>

            <div id="formToast" class="toast-message">Changes saved successfully!</div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancelModalBtn">Odustani</button>
                <button type="submit" class="btn btn-primary" id="submitUserChanges">Sacuvaj promene</button>
            </div>
        </form>
    </div>
</div>
</div>
<script th:src="@{/js/seat_reservation.js}" defer></script>
</body>
</html>
